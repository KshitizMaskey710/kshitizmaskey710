<header class="site-header">
  <div class="shell site-header__inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="Kshitiz Maskey home">
      <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Kshitiz Maskey" width="192" height="48">
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
    <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
      {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url or page.nav == item.label %} aria-current="page"{% endif %}>{{ item.label }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
