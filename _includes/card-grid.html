<div class="card-grid{% if include.compact %} card-grid--compact{% endif %}">
  {% for card in include.cards %}
    <article class="card"{% if card.id %} id="{{ card.id }}"{% endif %}>
      {% if card.label %}<p class="eyebrow">{{ card.label }}</p>{% endif %}
      <h3>{{ card.title }}</h3>
      <span class="rule" aria-hidden="true"></span>
      <p>{{ card.text }}</p>
      {% if card.url %}<a class="text-link" href="{{ card.url | relative_url }}">{{ card.link_label | default: 'Read more' }} →</a>{% endif %}
    </article>
  {% endfor %}
</div>
